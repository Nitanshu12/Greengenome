# /etc/nginx/sites-available/dashboard
# Symlink: sudo ln -s /etc/nginx/sites-available/dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;        # ← replace with your domain or VPS IP

    # ── Serve React build (static files) ─────────────────────
    root /var/www/dashboard/frontend/dist;
    index index.html;

    # ── React Router: all non-API routes → index.html ────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls → Node.js backend ────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Important for sessions (cookies)
        proxy_set_header   Connection        "";

        # File upload size limit (adjust if needed)
        client_max_body_size 25M;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "same-origin" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}

